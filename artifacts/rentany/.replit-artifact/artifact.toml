kind = "web"
previewPath = "/"
title = "RentAny - Peer-to-Peer Rental Marketplace"
version = "1.0.0"
id = "artifacts/rentany"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20214

[services.development]
run = "pnpm --filter @workspace/rentany run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rentany", "run", "build" ]
publicDir = "artifacts/rentany/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20214"
BASE_PATH = "/"
